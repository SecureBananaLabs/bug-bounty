<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">Cyber banana guardian pixel-art demo</title>
  <desc id="desc">Animated preview card for the cyber banana guardian pixel-art asset.</desc>
  <style>
    .bg { fill: #091018; }
    .grid { stroke: #153846; stroke-width: 1; opacity: .7; }
    .label { fill: #f7e58d; font: 700 18px monospace; }
    .sub { fill: #8fd8ce; font: 12px monospace; }
    .glow { fill: none; stroke: #46e0a4; stroke-width: 8; opacity: .55; }
    .px { shape-rendering: crispEdges; }
    @keyframes pulse { 0%, 100% { opacity: .35; transform: scale(.96); } 50% { opacity: .9; transform: scale(1.04); } }
    @keyframes scan { 0% { transform: translateY(-90px); opacity: 0; } 20%, 80% { opacity: .7; } 100% { transform: translateY(90px); opacity: 0; } }
    .pulse { animation: pulse 1.4s ease-in-out infinite; transform-origin: 180px 180px; }
    .scan { animation: scan 1.8s linear infinite; }
  </style>
  <rect class="bg" width="360" height="360" rx="12"/>
  <g opacity=".7">
    <path class="grid" d="M0 60h360M0 120h360M0 180h360M0 240h360M0 300h360M60 0v360M120 0v360M180 0v360M240 0v360M300 0v360"/>
  </g>
  <text class="label" x="22" y="36">cyber banana guardian</text>
  <text class="sub" x="22" y="336">64x64 original PNG preview</text>
  <rect class="pulse glow" x="88" y="82" width="184" height="184" rx="16"/>
  <g class="px" transform="translate(104 98) scale(2.375)">
    <rect width="64" height="64" fill="#101820"/>
    <rect x="17" y="10" width="11" height="42" fill="#f6d84b"/>
    <rect x="28" y="13" width="10" height="34" fill="#f2b83f"/>
    <rect x="38" y="20" width="7" height="21" fill="#d9912d"/>
    <rect x="13" y="16" width="8" height="9" fill="#fff0a1"/>
    <rect x="18" y="47" width="12" height="6" fill="#7b4b24"/>
    <rect x="42" y="24" width="12" height="17" fill="#48d597"/>
    <rect x="45" y="27" width="7" height="10" fill="#a9ffe4"/>
    <rect x="7" y="28" width="12" height="18" fill="#5c6cff"/>
    <rect x="10" y="31" width="6" height="12" fill="#b7c0ff"/>
    <rect x="21" y="21" width="4" height="4" fill="#0c1117"/>
    <rect x="25" y="21" width="4" height="4" fill="#66f5ff"/>
    <rect x="29" y="31" width="11" height="3" fill="#0c1117"/>
    <rect x="3" y="55" width="58" height="3" fill="#243b45"/>
    <rect x="5" y="57" width="54" height="2" fill="#46e0a4" opacity=".75"/>
  </g>
  <rect class="scan" x="82" y="178" width="196" height="4" fill="#66f5ff" opacity=".7"/>
</svg>
