name: API benchmark smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/api-benchmark-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify benchmark registry coverage
        run: npm run test:benchmarks

      - name: Run smoke API benchmark
        env:
          BENCHMARK_DURATION_SECONDS: "1"
          BENCHMARK_CONNECTIONS: "2"
          BENCHMARK_PIPELINING: "1"
          BENCHMARK_TTFB_SAMPLES: "2"
          BENCHMARK_JWT_SECRET: "development-secret"
        run: npm run benchmark:smoke

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-benchmark-smoke-results
          path: benchmarks/results/
