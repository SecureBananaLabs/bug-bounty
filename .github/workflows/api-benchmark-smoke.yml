name: API benchmark smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/api-benchmark-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test

      - name: Start API
        run: npm run dev -w apps/api > /tmp/freelanceflow-api.log 2>&1 &
        env:
          JWT_SECRET: development-secret
          PORT: 4000

      - name: Wait for API health
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/freelanceflow-api.log
          exit 1

      - name: Run smoke benchmark gate
        run: npm run benchmark:smoke
        env:
          BENCHMARK_BASE_URL: http://127.0.0.1:4000
          BENCHMARK_AUTH_SECRET: development-secret
