name: API Benchmark Smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/api-benchmark-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run benchmark:smoke
