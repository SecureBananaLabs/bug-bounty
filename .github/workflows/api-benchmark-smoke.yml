name: API benchmark smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - ".github/workflows/api-benchmark-smoke.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  api-benchmark-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run benchmark:smoke
