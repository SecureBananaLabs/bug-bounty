name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Patterns that indicate low hanging fruit / easy fixes
            const lowHangingPatterns = [
              { pattern: /TODO|FIXME|HACK|XXX|BUG/g, label: 'todo-fixme' },
              { pattern: /console\.(log|warn|error)\(/g, label: 'console-statements' },
              { pattern: /\/\/ @ts-ignore/g, label: 'ts-ignore' },
              { pattern: /unused|deprecated|legacy/i, label: 'cleanup' },
            ];

            // Files to scan for issues
            const scanDirs = ['apps', 'packages'];
            const findings = [];

            function scanDirectory(dir, depth = 0) {
              if (depth > 3) return; // Limit recursion depth
              
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                
                if (entry.isDirectory() && !entry.name.startsWith('.') && !entry.name.includes('node_modules')) {
                  scanDirectory(fullPath, depth + 1);
                } else if (entry.isFile() && /\.(ts|tsx|js|jsx|json|md|yml|yaml)$/.test(entry.name)) {
                  try {
                    const content = fs.readFileSync(fullPath, 'utf-8');
                    
                    for (const { pattern, label } of lowHangingPatterns) {
                      const matches = content.match(pattern);
                      if (matches && matches.length > 0) {
                        findings.push({
                          file: fullPath,
                          label,
                          count: matches.length,
                          description: `Found ${matches.length} instance(s) of \`${label}\` pattern in \`${fullPath}\``
                        });
                      }
                    }
                  } catch (err) {
                    // Skip files we can't read
                  }
                }
              }
            }

            // Start scanning
            for (const scanDir of scanDirs) {
              if (fs.existsSync(scanDir)) {
                scanDirectory(scanDir);
              }
            }

            // Create issues for findings, grouped by label
            const groupedFindings = findings.reduce((acc, finding) => {
              if (!acc[finding.label]) acc[finding.label] = [];
              acc[finding.label].push(finding);
              return acc;
            }, {});

            for (const [label, groupFindings] of Object.entries(groupedFindings)) {
              const issueTitle = `[Low Hanging Fruit] Automated detection: ${label}`;
              
              // Check if issue already exists
              const { data: existingIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                creator: 'github-actions[bot]'
              });

              const alreadyExists = existingIssues.some(issue => issue.title === issueTitle);
              if (alreadyExists) continue;

              const body = `## Automated Low Hanging Fruit Detection

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

### Findings
${groupFindings.map(f => `- ${f.description}`).join('\n')}

### Suggested Action
Review the identified patterns and create a pull request to address them.`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: body,
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty']
              });
            }


            console.log(`Scanned and created issues for ${Object.keys(groupedFindings).length} categories of low hanging fruit.`);
          github-token: ${{ secrets.GITHUB_TOKEN }}