name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Recursive function to scan files for low hanging fruit patterns
            async function scanForLowHangingFruit(dir, patterns) {
              const findings = [];
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                
                if (entry.isDirectory() && entry.name !== 'node_modules' && entry.name !== '.git') {
                  findings.push(...await scanForLowHangingFruit(fullPath, patterns));
                } else if (entry.isFile()) {
                  const ext = path.extname(fullPath);
                  if (['.js', '.ts', '.tsx', '.jsx', '.py', '.java', '.go', '.rs', '.md'].includes(ext)) {
                    try {
                      const content = fs.readFileSync(fullPath, 'utf-8');
                      for (const pattern of patterns) {
                        if (pattern.regex.test(content)) {
                          findings.push({
                            file: fullPath,
                            type: pattern.type,
                            description: pattern.description,
                            severity: pattern.severity
                          });
                        }
                      }
                    } catch (e) {
                      // Skip files that can't be read
                    }
                  }
                }
              }
              
              return findings;
            }
            
            const lowHangingFruitPatterns = [
              { regex: /TODO|FIXME|HACK|XXX|BUG/i, type: 'code-debt', description: 'Code debt markers found', severity: 'low' },
              { regex: /console\.(log|warn|error)\(/, type: 'debug-logging', description: 'Debug logging statements in production code', severity: 'low' },
              { regex: /process\.env\.[A-Z_]+/, type: 'env-usage', description: 'Direct environment variable access without validation', severity: 'medium' },
              { regex: /\/\/\s*eslint-disable/, type: 'lint-suppression', description: 'ESLint rule suppression found', severity: 'low' },
              { regex: /setTimeout\(|setInterval\(/, type: 'timing-functions', description: 'Timer functions may need cleanup', severity: 'low' },
              { regex: /fetch\(|axios\.|http\.request/, type: 'unhandled-requests', description: 'Network requests without explicit error handling', severity: 'medium' },
              { regex: /JSON\.parse\(/, type: 'unsafe-parsing', description: 'JSON parsing without try-catch', severity: 'medium' },
              { regex: /eval\(|Function\(|new Function/, type: 'unsafe-eval', description: 'Unsafe dynamic code execution', severity: 'high' },
              { regex: /innerHTML|dangerouslySetInnerHTML/, type: 'xss-risk', description: 'Potential XSS vulnerability', severity: 'high' },
              { regex: /password|secret|key|token/i, type: 'sensitive-data', description: 'Potential hardcoded sensitive data', severity: 'high' }
            ];
            
            const findings = await scanForLowHangingFruit('.', lowHangingFruitPatterns);
            
            // Group findings by type to avoid duplicate issues
            const groupedFindings = {};
            for (const finding of findings) {
              if (!groupedFindings[finding.type]) {
                groupedFindings[finding.type] = [];
              }
              groupedFindings[finding.type].push(finding);
            }
            
            // Create issues for each finding type
            for (const [type, items] of Object.entries(groupedFindings)) {
              const issueTitle = `[Low Hanging Fruit] ${type}: ${items.length} occurrence${items.length !== 1 ? 's' : ''} detected`;
              const issueBody = `## Automated Low Hanging Fruit Detection

This issue was automatically created by the Low Hanging Fruit Automation workflow.

**Detection Type:** \`${type}\`
**Severity:** ${items[0].severity}
**Files Affected:** ${items.length}

### Affected Files
${items.map(i => `- \`${i.file}\``).join('\n')}

### Description
${items[0].description}

---

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

/bounty $50`;

              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: issueBody,
                  labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty']
                });
                console.log(`Created issue: ${issueTitle}`);
              } catch (error) {
                console.error(`Failed to create issue for ${type}:`, error.message);
              }
            }
            
            console.log(`Scan complete. Found ${findings.length} low hanging fruit items.`);