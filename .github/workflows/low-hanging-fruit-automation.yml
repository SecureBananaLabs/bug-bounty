name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detector
        run: node .github/scripts/detect-low-hanging-fruit.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  recursive-issue-creation:
    runs-on: ubuntu-latest
    needs: detect-and-create-issues
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger recursive issue creation
        run: |
          echo "Checking for new issues to recursively create..."
          # This job ensures the automation continues to run recursively
          # by scheduling follow-up runs when new issues are detected
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}