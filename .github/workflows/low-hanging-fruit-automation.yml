name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no issues created)'
        required: false
        default: 'false'

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detection
        id: detect
        run: |
          node .github/scripts/detect-low-hanging-fruit.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

  recursive-follow-up:
    needs: detect-and-create-issues
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses:        actions/checkout@v4

      - name: Trigger next iteration
        run: |
          # Schedule next run by creating a follow-up trigger
          # This ensures continuous recursive operation
          echo "Scheduling next low hanging fruit detection cycle"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
