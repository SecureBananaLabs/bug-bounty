name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GITHUB_TOKEN;

          function runCommand(cmd) {
            return execSync(cmd, { encoding: 'utf-8', stdio: 'pipe' }).trim();
          }

          function createIssue(title, body) {
            const escapedBody = body.replace(/"/g, '\\"');
            const cmd = `curl -s -X POST \
              -H "Authorization: token ${token}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${repo}/issues \
              -d "{\"title\":\"${title}\",\"body\":\"${escapedBody}\"}"`;
            return runCommand(cmd);
          }

          function getExistingIssues() {
            const cmd = `curl -s -H "Authorization: token ${token}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${repo}/issues?state=all&per_page=100"`;
            const response = runCommand(cmd);
            return JSON.parse(response);
          }

          function findLowHangingFruit() {
            const issues = [];
            
            // Check for missing documentation
            if (!fs.existsSync('CONTRIBUTING.md') || fs.statSync('CONTRIBUTING.md').size < 100) {
              issues.push({
                title: 'Improve CONTRIBUTING.md documentation',
                body: 'The CONTRIBUTING.md file is missing or too minimal. Please add detailed contribution guidelines including:\n- How to set up the development environment\n- How to run tests\n- Pull request requirements\n- Code style guidelines\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.'
              });
            }
            
            // Check for missing tests
            const hasTestScript = fs.existsSync('package.json') && 
              JSON.parse(fs.readFileSync('package.json', 'utf-8')).scripts?.test;
            if (!hasTestScript) {
              issues.push({
                title: 'Add test scripts to package.json',
                body: 'The package.json is missing a test script. Please add appropriate test commands for the monorepo.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.'
              });
            }
            
            // Check for missing CI/CD
            if (!fs.existsSync('.github/workflows')) {
              issues.push({
                title: 'Add GitHub Actions CI/CD pipeline',
                body: 'No GitHub Actions workflows found. Please add CI/CD pipelines for testing, linting, and deployment.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.'
              });
            }
            
            // Check for missing environment documentation
            if (!fs.readFileSync('README.md', 'utf-8').includes('.env')) {
              issues.push({
                title: 'Document required environment variables',
                body: 'The README mentions environment variables but does not document all required .env values. Please add a complete list with descriptions.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.'
              });
            }
            
            return issues;
          }

          try {
            const existingIssues = getExistingIssues();
            const existingTitles = new Set(existingIssues.map(i => i.title.toLowerCase()));
            const newIssues = findLowHangingFruit();
            
            for (const issue of newIssues) {
              if (!existingTitles.has(issue.title.toLowerCase())) {
                console.log(`Creating issue: ${issue.title}`);
                createIssue(issue.title, issue.body);
              }
            }
          } catch (error) {
            console.error('Error:', error.message);
            process.exit(1);
          }
          EOF
