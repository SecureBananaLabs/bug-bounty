name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Recursively scan for common low hanging fruit patterns
            async function scanForIssues(dir, baseDir = dir) {
              const issues = [];
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                const relativePath = path.relative(baseDir, fullPath);
                
                if (entry.isDirectory()) {
                  if (entry.name === 'node_modules' || entry.name === '.git' || entry.name === '.github') continue;
                  issues.push(...await scanForIssues(fullPath, baseDir));
                } else if (entry.isFile()) {
                  // Check for TODO/FIXME comments
                  if (entry.name.match(/\.(ts|tsx|js|jsx|py|java|go|rs|rb|php|cs|cpp|c|h|swift|kt|scala|rs|md)$/)) {
                    try {
                      const content = fs.readFileSync(fullPath, 'utf8');
                      const lines = content.split('\n');
                      lines.forEach((line, idx) => {
                        const match = line.match(/(TODO|FIXME|HACK|BUG|XXX|NOTE):\s*(.+)/i);
                        if (match) {
                          issues.push({
                            title: `Low Hanging Fruit: ${match[1]} in ${relativePath}`,
                            body: `Found a ${match[1]} marker in \`${relativePath}\` at line ${idx + 1}:\n\n\`\`\`\n${line.trim()}\n\`\`\`\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`,
                            file: relativePath,
                            line: idx + 1
                          });
                        }
                      });
                    } catch (e) {
                      // Binary or unreadable file, skip
                    }
                  }
                  
                  // Check for empty files that might need implementation
                  if (entry.name.match(/\.(ts|tsx|js|jsx|py|java|go|rs|rb|php|cs|cpp|c|h|swift|kt|scala|rs)$/)) {
                    try {
                      const content = fs.readFileSync(fullPath, 'utf8');
                      if (content.trim().length === 0 || content.trim() === '// TODO' || content.trim() === '/* TODO */') {
                        issues.push({
                          title: `Low Hanging Fruit: Empty/Stub file ${relativePath}`,
                          body: `File \`${relativePath}\` appears to be empty or a stub that needs implementation.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`,
                          file: relativePath,
                          line: 1
                        });
                      }
                    } catch (e) {}
                  }
                }
              }
              
              return issues;
            }
            
            const detectedIssues = await scanForIssues(process.cwd());
            
            // Get existing open issues to avoid duplicates
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const existingTitles = new Set(existingIssues.map(i => i.title));
            
            // Create issues for detected items that don't already exist
            let createdCount = 0;
            for (const issue of detectedIssues) {
              if (!existingTitles.has(issue.title)) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: ['low-hanging-fruit', 'good first issue', 'bug bounty', 'AI agent friendly']
                });
                createdCount++;
              }
            }
            
            console.log(`Scanned and created ${createdCount} new issues out of ${detectedIssues.length} detected items.`);