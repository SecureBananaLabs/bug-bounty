name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detection
        id: detect
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const issues = [];
          
          // Check for missing tests
          const testFiles = [];
          function findTests(dir, pattern) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory() && entry.name !== 'node_modules' && entry.name !== '.git') {
                findTests(fullPath, pattern);
              } else if (entry.isFile() && entry.name.match(pattern)) {
                testFiles.push(fullPath);
              }
            }
          }
          try { findTests('.', /\.(test|spec)\.(js|ts|jsx|tsx)$/); } catch(e) {}
          
          if (testFiles.length === 0) {
            issues.push({
              title: 'Add unit tests for core functionality',
              body: 'No test files were detected in the repository. Add comprehensive unit tests to improve code reliability.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can responsiveness to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.',
              labels: ['bug', 'good first issue', 'help wanted']
            });
          }
          
          // Check for missing documentation
          const docs = ['CONTRIBUTING.md', 'LICENSE', 'CHANGELOG.md', 'SECURITY.md'];
          for (const doc of docs) {
            if (!fs.existsSync(doc)) {
              issues.push({
                title: \`Add \${doc} to the repository\`,
                body: \`The \${doc} file is missing from the repository. This file is important for project governance and contributor guidelines.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\`,
                labels: ['documentation', 'good first issue', 'help wanted']
              });
            }
          }
          
          // Check for missing environment variable documentation
          if (!fs.existsSync('.env.example')) {
            issues.push({
              title: 'Add .env.example file for environment variable documentation',
              body: 'No .env.example file found. Create one to document required environment variables for local development.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.',
              labels: ['documentation', 'good first issue', 'help wanted']
            });
          }
          
          fs.writeFileSync('detected-issues.json', JSON.stringify(issues, null, 2));
          console.log('Detected issues:', issues.length);
          "

      - name: Create GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const issues = JSON.parse(fs.readFileSync('detected-issues.json', 'utf8'));
          
          async function createIssue(issue) {
            const response = await fetch('https://api.github.com/repos/${{ github.repository }}/issues', {
              method: 'POST',
              headers: {
                'Authorization': \`token \${process.env.GITHUB_TOKEN}\`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                title: issue.title,
                body: issue.body,
                labels: issue.labels
              })
            });
            
            if (response.ok) {
              const data = await response.json();
              console.log(\`Created issue #\${data.number}: \${issue.title}\`);
            } else if (response.status === 422) {
              // Issue likely already exists (validation failed)
              console.log(\`Issue already exists or validation failed: \${issue.title}\`);
            } else {
              console.error(\`Failed to create issue: \${response.status} \${response.statusText}\`);
            }
          }
          
          (async () => {
            for (const issue of issues) {
              await createIssue(issue);
              // Rate limit: wait between requests
              await new Promise(resolve => setTimeout(resolve, 1000));
            }
          })();
          "
