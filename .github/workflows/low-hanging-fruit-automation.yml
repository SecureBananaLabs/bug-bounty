name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // Patterns that indicate low hanging fruit / easy fixes
          const patterns = [
            { pattern: /TODO|FIXME|HACK|XXX|BUG/, type: 'code-comment', label: 'good first issue' },
            { pattern: /console\\.(log|warn|error)/, type: 'debug-statement', label: 'good first issue' },
            { pattern: /throw new Error\\(['\\\"]Not implemented['\\\"]\\)/, type: 'not-implemented', label: 'good first issue' },
            { pattern: /res\\.status\\(501\\)/, type: 'not-implemented', label: 'good first issue' },
          ];
          
          const results = [];
          
          function scanDir(dir, relativePath = '') {
            const items = fs.readdirSync(dir, { withFileTypes: true });
            for (const item of items) {
              const fullPath = path.join(dir, item.name);
              const relPath = path.join(relativePath, item.name);
              
              if (item.isDirectory()) {
                if (item.name === 'node_modules' || item.name === '.git' || item.name === 'dist' || item.name === 'build') continue;
                scanDir(fullPath, relPath);
              } else if (item.isFile() && /\\.(ts|tsx|js|jsx|py|rb|go|rs|java|kt|swift|md)$/.test(item.name)) {
                try {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const lines = content.split('\\n');
                  lines.forEach((line, idx) => {
                    patterns.forEach(p => {
                      if (p.pattern.test(line)) {
                        results.push({
                          file: relPath,
                          line: idx + 1,
                          content: line.trim(),
                          type: p.type,
                          label: p.label
                        });
                      }
                    });
                  });
                } catch (e) {}
              }
            }
          }
          
          scanDir('.');
          
          // Group by file to create focused issues
          const grouped = {};
          results.forEach(r => {
            const key = \`\${r.file}:\${r.type}\`;
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(r);
          });
          
          const issueBodies = Object.entries(grouped).slice(0, 5).map(([key, items]) => {
            const [file, type] = key.split(':');
            const title = \`Low Hanging Fruit: Fix \${type} in \${file}\`;
            const body = \`## Automated Low Hanging Fruit Detection

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

### Detected Items:
\${items.map(i => \`- [ ] \${file}#L\${i.line}: \`\`\`\${i.content}\`\`\`\`).join('\\n')}

### Type: \\\`\${type}\\\`

Please create a pull request that addresses these items.
\`;
            return { title, body, labels: [type, 'good first issue', 'bug bounty', 'AI agent friendly'] };
          });
          
          console.log(JSON.stringify(issueBodies, null, 2));
          "