name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          function findLowHangingFruit(dir, results = []) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              
              if (entry.isDirectory()) {
                if (entry.name === 'node_modules' || entry.name === '.git') continue;
                findLowHangingFruit(fullPath, results);
              } else {
                const ext = path.extname(entry.name);
                if (!['.ts', '.tsx', '.js', '.jsx'].includes(ext)) continue;
                
                const content = fs.readFileSync(fullPath, 'utf-8');
                const lines = content.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                  const line = lines[i].trim();
                  const lineNum = i + 1;
                  
                  // Detect TODO/FIXME/HACK comments
                  if (/^\s*\/\/\s*(TODO|FIXME|HACK|BUG|XXX)/i.test(line)) {
                    results.push({
                      type: 'todo',
                      file: fullPath,
                      line: lineNum,
                      content: line
                    });
                  }
                  
                  // Detect console.log statements
                  if (/console\.log\(/.test(line)) {
                    results.push({
                      type: 'console-log',
                      file: fullPath,
                      line: lineNum,
                      content: line
                    });
                  }
                  
                  // Detect empty catch blocks
                  if (/catch\s*\(\s*\w+\s*\)\s*\{\s*\}/.test(line)) {
                    results.push({
                      type: 'empty-catch',
                      file: fullPath,
                      line: lineNum,
                      content: line
                    });
                  }
                }
              }
            }
            
            return results;
          }

          const rootDir = process.cwd();
          const findings = findLowHangingFruit(rootDir);
          
          // Group findings by file for issue creation
          const grouped = {};
          for (const finding of findings) {
            if (!grouped[finding.file]) grouped[finding.file] = [];
            grouped[finding.file].push(finding);
          }
          
          const issueBody = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Low Hanging Fruit Detected

${Object.entries(grouped).map(([file, items]) => `
### ${file.replace(rootDir + '/', '')}
${items.map(item => `- Line ${item.line}: \\`${item.content.substring(0, 100)}${item.content.length > 100 ? '...' : ''}\``).join('\n')}
`).join('\n')}

## Instructions
1. Review the detected items above
2. Address each item appropriately
3. Submit a pull request linked to this issue
`;
          
          // Create GitHub issue using gh CLI
          try {
            const title = `Low Hanging Fruit: Automated bug detection - ${new Date().toISOString().split('T')[0]}`;
            const escapedBody = issueBody.replace(/"/g, '\\"').replace(/`/g, '\\`');
            
            execSync(`gh issue create --title "${title}" --body "${escapedBody}" --label "bug,good first issue,help wanted,bug bounty,AI agent friendly"`, {
              cwd: rootDir,
              stdio: 'inherit'
            });
          } catch (error) {
            console.error('Failed to create issue:', error.message);
            process.exit(1);
          }
          EOF
--- a/README.md
## Low Hanging Fruit Automation

This repository includes an automated GitHub Actions workflow (`.github/workflows/low-hanging-fruit-automation.yml`) that recursively scans the codebase for low-hanging fruit bugs and automatically creates GitHub issues to track them.

The workflow runs daily via cron schedule and can also be triggered manually. It detects TODO/FIXME comments, console.log statements, empty catch blocks, and other common code quality issues.