name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detection
        id: detect
        run: |
          node scripts/detect-low-hanging-fruit.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  recursive-issue-creation:
    runs-on: ubuntu-latest
    needs: detect-and-create-issues
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger recursive issue creation
        run: |
          echo "Low hanging fruit automation cycle completed. Check created issues for next steps."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}