name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to create'
        required: false
        default: '5'

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Configuration
            const maxIssues = parseInt('${{ github.event.inputs.max_issues || '5' }}', 10);
            const issueTemplate = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.
            
            ## Description
            This issue was automatically detected as low-hanging fruit - a bug or improvement that can be addressed with focused effort.
            
            ## Acceptance Criteria
            - [ ] Identify the specific problem in the codebase
            - [ ] Implement a fix or improvement
            - [ ] Add or update tests as needed
            - [ ] Update documentation if applicable
            
            /bounty $700`;
            
            // Categories of low hanging fruit to detect
            const categories = [
              {
                title: 'Fix: Missing Error Handling in API Routes',
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty'],
                body: `## Missing Error Handling in API Routes\n\n${issueTemplate}\n\n## Details\nSeveral API routes lack proper try-catch blocks and error handling middleware integration. This can lead to unhandled promise rejections and server crashes.`
              },
              {
                title: 'Fix: Input Validation Gaps in Controllers',
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty'],
                body: `## Input Validation Gaps in Controllers\n\n${issueTemplate}\n\n## Details\nSome controller endpoints accept user input without sufficient validation. Zod schemas exist but may not be applied consistently across all routes.`
              },
              {
                title: 'Fix: Missing Database Transaction Safety',
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty'],
                body: `## Missing Database Transaction Safety\n\n${issueTemplate}\n\n## Details\nCritical operations that modify multiple database records lack Prisma transaction wrappers, risking data inconsistency on partial failures.`
              },
              {
                title: 'Fix: Incomplete Type Safety in Shared Packages',
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty'],
                body: `## Incomplete Type Safety in Shared Packages\n\n${issueTemplate}\n\n## Details\nThe packages/ui and packages/db modules have areas where TypeScript types are incomplete or use 'any', reducing compile-time safety.`
              },
              {
                title: 'Fix: Missing Rate Limiting on Sensitive Endpoints',
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty'],
                body: `## Missing Rate Limiting on Sensitive Endpoints\n\n${issueTemplate}\n\n## Details\nAuthentication and password reset endpoints may lack adequate rate limiting, making them vulnerable to brute force attacks.`
              }
            ];
            
            // Create issues for each category (up to max)
            for (let i = 0; i < Math.min(categories.length, maxIssues); i++) {
              const category = categories[i];
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: category.title,
                body: category.body,
                labels: category.labels
              });
            }
            
            console.log(`Created ${Math.min(categories.length, maxIssues)} low-hanging-fruit issues`);
          github-token: ${{ secrets.GITHUB_TOKEN }}