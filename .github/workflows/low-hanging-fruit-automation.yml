name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Recursive function to scan for low hanging fruit patterns
            async function scanForLowHangingFruit(dir, patterns, results = []) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                
                if (entry.isDirectory() && entry.name !== 'node_modules' && entry.name !== '.git') {
                  await scanForLowHangingFruit(fullPath, patterns, results);
                } else if (entry.isFile()) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const lines = content.split('\n');
                  
                  for (let i = 0; i < lines.length; i++) {
                    for (const pattern of patterns) {
                      if (pattern.regex.test(lines[i])) {
                        results.push({
                          file: fullPath,
                          line: i + 1,
                          type: pattern.type,
                          description: pattern.description,
                          severity: pattern.severity,
                          content: lines[i].trim()
                        });
                      }
                    }
                  }
                }
              }
              
              return results;
            }

            // Define low hanging fruit patterns
            const patterns = [
              { regex: /TODO|FIXME|HACK|XXX|BUG/, type: 'code-debt', description: 'Technical debt or incomplete implementation found', severity: 'medium' },
              { regex: /console\.(log|warn|error)\s*\(/, type: 'debug-statements', description: 'Debug console statements should be removed', severity: 'low' },
              { regex: /\/\/\s*eslint-disable/, type: 'linting-override', description: 'ESLint disabled - potential code quality issue', severity: 'low' },
              { regex: /process\.env\.[A-Z_]+/, type: 'env-usage', description: 'Environment variable usage - verify proper validation', severity: 'low' },
              { regex: /throw\s+new\s+Error\s*\(\s*['"`][^'"]*['"`]\s*\)/, type: 'error-handling', description: 'Generic error throwing - consider custom error classes', severity: 'low' }
            ];

            // Scan the repository
            const findings = await scanForLowHangingFruit('.', patterns);
            
            // Group findings by type
            const grouped = findings.reduce((acc, finding) => {
              if (!acc[finding.type]) acc[finding.type] = [];
              acc[finding.type].push(finding);
              return acc;
            }, {});

            // Create issues for each type
            for (const [type, items] of Object.entries(grouped)) {
              if (items.length === 0) continue;
              
              const title = `Low Hanging Fruit: ${type.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}`;
              
              const body = `## Automated Low Hanging Fruit Detection

This issue was automatically created by the Low Hanging Fruit automation system.

### Findings (${items.length})

${items.map(item => `- **${item.file}** (line ${item.line}): ${item.description}
  \`\`\`
  ${item.content}
  \`\`\``).join('\n')}

### Next Steps
- Review each finding and determine if action is needed
- Create sub-issues for complex fixes
- Submit a PR referencing this issue

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

/bounty $50`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', 'bounty', '💎 Bounty', 'automated']
              });
            }

            console.log(`Created issues for ${Object.keys(grouped).length} finding types`);
            console.log('Total findings:', findings.length);