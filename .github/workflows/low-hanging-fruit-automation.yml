name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Patterns that indicate low hanging fruit / easy fixes
            const lowHangingPatterns = [
              { pattern: /TODO|FIXME|HACK|XXX|BUG/g, label: 'todo-fixme' },
              { pattern: /console\.log/g, label: 'remove-console-logs' },
              { pattern: /unused|deprecated|legacy/gi, label: 'cleanup' },
              { pattern: /type.*any/g, label: 'typescript-strictness' },
              { pattern: /eslint-disable/g, label: 'eslint-cleanup' },
            ];

            // Files to scan
            const extensions = ['.ts', '.tsx', '.js', '.jsx', '.py', '.md'];
            const results = [];

            function scanDirectory(dir, relativePath = '') {
              const items = fs.readdirSync(dir, { withFileTypes: true });
              for (const item of items) {
                const fullPath = path.join(dir, item.name);
                const relPath = path.join(relativePath, item.name);
                
                if (item.isDirectory() && !item.name.startsWith('.') && item.name !== 'node_modules') {
                  scanDirectory(fullPath, relPath);
                } else if (item.isFile() && extensions.some(ext => item.name.endsWith(ext))) {
                  try {
                    const content = fs.readFileSync(fullPath, 'utf-8');
                    for (const { pattern, label } of lowHangingPatterns) {
                      const matches = content.match(pattern);
                      if (matches) {
                        results.push({
                          file: relPath,
                          issueType: label,
                          count: matches.length,
                          description: `Found ${matches.length} instance(s) of ${label} in ${relPath}`
                        });
                      }
                    }
                  } catch (err) {
                    console.log(`Error reading ${fullPath}: ${err.message}`);
                  }
                }
              }
            }

            scanDirectory('.');

            // Group results by issue type
            const grouped = {};
            for (const result of results) {
              if (!grouped[result.issueType]) {
                grouped[result.issueType] = [];
              }
              grouped[result.issueType].push(result);
            }

            // Create issues for each category
            const issueTemplate = "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.";

            for (const [issueType, items] of Object.entries(grouped)) {
              const title = `[Low Hanging Fruit] ${issueType}: ${items.length} file(s) need attention`;
              const body = `## Automated Low Hanging Fruit Detection

${issueTemplate}

### Files Affected
${items.map(item => `- ${item.file} (${item.count} occurrence${item.count > 1 ? 's' : ''})`).join('\n')}

### Description
This issue was automatically created by the Low Hanging Fruit automation to track easy fixes in the codebase.

### Next Steps
1. Review the affected files
2. Create a focused issue for your specific fix
3. Reference this issue (#743) in your new issue
4. Submit a pull request linked to your created issue

/bounty $50`;

              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty']
                });
                console.log(`Created issue: ${title}`);
              } catch (err) {
                console.log(`Error creating issue for ${issueType}: ${err.message}`);
              }
            }

            console.log('Low hanging fruit scan complete.');