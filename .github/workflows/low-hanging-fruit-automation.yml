name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Recursively find files with common low-hanging fruit patterns
            function findFiles(dir, patterns, results = []) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory() && entry.name !== 'node_modules' && entry.name !== '.git') {
                  findFiles(fullPath, patterns, results);
                } else if (entry.isFile()) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  for (const pattern of patterns) {
                    if (pattern.test(content)) {
                      results.push({ path: fullPath, pattern: pattern.toString() });
                      break;
                    }
                  }
                }
              }
              return results;
            }
            
            // Define patterns for low-hanging fruit detection
            const patterns = [
              /TODO|FIXME|HACK|BUG|XXX/,           // Code comments indicating issues
              /console\.(log|warn|error)\(/,       // Debug console statements
              /debugger;/,                         // Debugger statements
              /process\.env\.[A-Z_]+/,            // Environment variables (potential misconfig)
              /throw new Error\(['"]TODO/,        // Placeholder errors
              /\/\/\s*@ts-ignore/,                // TypeScript ignore comments
              /eslint-disable/,                    // Disabled linting
              /describe\.skip|it\.skip|test\.skip/, // Skipped tests
            ];
            
            const findings = findFiles('.', patterns);
            
            // Group findings by file for cleaner issues
            const fileMap = {};
            for (const finding of findings) {
              if (!fileMap[finding.path]) {
                fileMap[finding.path] = [];
              }
              fileMap[finding.path].push(finding.pattern);
            }
            
            // Create issues for each finding
            const issuePromises = [];
            for (const [filePath, matchedPatterns] of Object.entries(fileMap)) {
              const title = `Low Hanging Fruit: Fix issues in ${filePath}`;
              const body = `## Automated Low Hanging Fruit Detection
            
**File:** \`${filePath}\`
            
**Detected Patterns:** ${matchedPatterns.map(p => `\`${p}\``).join(', ')}
            
This issue was automatically created by the Low Hanging Fruit automation. Please review the file and address the detected issues.
            
This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.
            
---
            
*This issue is part of the automated low-hanging-fruit detection system. Bounty: $700*`;
            
              issuePromises.push(
                github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty', '$700']
                })
              );
            }
            
            await Promise.all(issuePromises);
            console.log(`Created ${issuePromises.length} issues for low hanging fruit.`);
          github-token: ${{ secrets.GITHUB_TOKEN }}