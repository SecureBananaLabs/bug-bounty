name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // Patterns that indicate low hanging fruit bugs
          const lowHangingPatterns = [
            { pattern: /TODO|FIXME|HACK|BUG|XXX/g, type: 'code-smell', title: 'Unresolved TODO/FIXME comment found' },
            { pattern: /console\\.(log|warn|error)\\(/g, type: 'debug-code', title: 'Debug console statement found in production code' },
            { pattern: /process\\.env\\.[A-Z_]+/g, type: 'env-check', title: 'Environment variable usage without validation' },
            { pattern: /throw new Error\\(['\\\"][^'\\\"]*['\\\"]\\)/g, type: 'error-handling', title: 'Generic error throwing without proper handling' },
            { pattern: /\\/\\/.*deprecated|deprecated/i, type: 'deprecated', title: 'Deprecated code usage detected' },
            { pattern: /setTimeout\\(|setInterval\\(/g, type: 'timing', title: 'Timer usage without cleanup' },
            { pattern: /\\.only\\(|\\.skip\\(/g, type: 'test-issue', title: 'Test focus/skip directive found' },
            { pattern: /eval\\(|Function\\(|new Function/g, type: 'security', title: 'Dynamic code execution detected' },
          ];
          
          const results = [];
          
          function scanDirectory(dir, basePath = '') {
            const items = fs.readdirSync(dir, { withFileTypes: true });
            for (const item of items) {
              const fullPath = path.join(dir, item.name);
              const relativePath = path.join(basePath, item.name);
              
              if (item.isDirectory() && !item.name.startsWith('.') && item.name !== 'node_modules') {
                scanDirectory(fullPath, relativePath);
              } else if (item.isFile() && /\\.(js|ts|tsx|jsx|py|rb|go|rs|java|php)$/.test(item.name)) {
                scanFile(fullPath, relativePath);
              }
            }
          }
          
          function scanFile(fullPath, relativePath) {
            const content = fs.readFileSync(fullPath, 'utf-8');
            const lines = content.split('\\n');
            
            for (const [lineNum, line] of lines.entries()) {
              for (const { pattern, type, title } of lowHangingPatterns) {
                if (pattern.test(line)) {
                  results.push({
                    file: relativePath,
                    line: lineNum + 1,
                    type,
                    title,
                    snippet: line.trim().substring(0, 100)
                  });
                }
              }
            }
          }
          
          scanDirectory('.');
          
          // Group by type and create issues
          const grouped = {};
          for (const result of results) {
            if (!grouped[result.type]) grouped[result.type] = [];
            grouped[result.type].push(result);
          }
          
          const issueBody = \`This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Detected Low Hanging Fruit

\${results.map(r => '- **' + r.file + ':' + r.line + '** - ' + r.title + ': \\`' + r.snippet + '\\`').join('\\n')}

## Instructions
1. Review the detected items above
2. Create a focused fix for one category
3. Open a PR referencing this issue\`;
          
          // Output for GitHub CLI
          const title = 'Low Hanging Fruit: Automated Detection Results';
          fs.writeFileSync('issue-body.txt', issueBody);
          fs.writeFileSync('issue-title.txt', title);
          console.log('ISSUE_TITLE=' + title);
          console.log('ISSUE_COUNT=' + results.length);
          "
          
          ISSUE_TITLE=$(cat issue-title.txt)
          ISSUE_BODY=$(cat issue-body.txt)
          
          # Create the issue using GitHub CLI
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --label "bug,good first issue,help wanted,bug bounty,AI agent friendly" \
            || echo "Issue creation may have failed or already exists"