name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Recursive function to scan for low hanging fruit patterns
            async function scanForLowHangingFruit(dir, patterns, results = []) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                
                if (entry.isDirectory() && entry.name !== 'node_modules' && entry.name !== '.git') {
                  await scanForLowHangingFruit(fullPath, patterns, results);
                } else if (entry.isFile()) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const lines = content.split('\n');
                  
                  for (let i = 0; i < lines.length; i++) {
                    for (const pattern of patterns) {
                      if (pattern.regex.test(lines[i])) {
                        results.push({
                          file: fullPath,
                          line: i + 1,
                          type: pattern.type,
                          description: pattern.description,
                          severity: pattern.severity,
                          content: lines[i].trim()
                        });
                      }
                    }
                  }
                }
              }
              
              return results;
            }

            // Define low hanging fruit patterns
            const patterns = [
              { regex: /TODO|FIXME|HACK|XXX|BUG/, type: 'code-debt', description: 'Technical debt or incomplete implementation found', severity: 'medium' },
              { regex: /console\.(log|warn|error)\(/, type: 'debug-code', description: 'Debug console statements should be removed', severity: 'low' },
              { regex: /\/\/\s*TEMPORARY|TEMP\b/, type: 'temporary-code', description: 'Temporary code that needs proper implementation', severity: 'medium' },
              { regex: /process\.env\.[A-Z_]+/, type: 'env-check', description: 'Environment variable usage - verify all are documented', severity: 'low' },
              { regex: /throw new Error\(['"`]\s*not implemented/i, type: 'not-implemented', description: 'Feature not yet implemented', severity: 'high' },
              { regex: /\/\/\s*(SECURITY|SECURITY NOTE|INSECURE)/i, type: 'security-note', description: 'Security-related comment found - needs review', severity: 'high' }
            ];

            // Scan repository
            const findings = await scanForLowHangingFruit('.', patterns);
            
            // Group findings by type for issue creation
            const grouped = {};
            for (const finding of findings) {
              if (!grouped[finding.type]) grouped[finding.type] = [];
              grouped[finding.type].push(finding);
            }

            // Create issues for each type
            const issuePromises = [];
            for (const [type, items] of Object.entries(grouped)) {
              const title = `Low Hanging Fruit: ${type.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}`;
              
              const body = `## Automated Low Hanging Fruit Detection

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

### Findings (${items.length} items)

${items.map(item => `- **${item.file}** (line ${item.line}): \\`\\`\\`${item.content}\\`\\`\\``).join('\n')}

### Severity
${items[0]?.severity || 'unknown'}

### Description
${items[0]?.description || 'Automated detection'}

---
*This issue was automatically created by the Low Hanging Fruit Automation workflow.*`;

              issuePromises.push(
                github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty']
                })
              );
            }

            await Promise.all(issuePromises);
            console.log(`Created ${issuePromises.length} issues from ${findings.length} findings.`);