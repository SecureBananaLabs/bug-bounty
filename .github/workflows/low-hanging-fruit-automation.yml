name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Recursively scan for common low hanging fruit patterns
            function scanForIssues(dir, patterns) {
              const issues = [];
              const files = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const file of files) {
                const fullPath = path.join(dir, file.name);
                if (file.isDirectory() && file.name !== 'node_modules' && file.name !== '.git') {
                  issues.push(...scanForIssues(fullPath, patterns));
                } else if (file.isFile()) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  for (const pattern of patterns) {
                    if (pattern.test(content)) {
                      issues.push({
                        file: fullPath,
                        type: pattern.name,
                        description: pattern.description
                      });
                    }
                  }
                }
              }
              return issues;
            }
            
            const lowHangingFruitPatterns = [
              {
                name: 'TODO/FIXME comments',
                test: /\/\/\s*(TODO|FIXME|HACK|BUG|XXX)/i,
                description: 'Found TODO/FIXME comments indicating incomplete work'
              },
              {
                name: 'Console logs in source',
                test: /console\.(log|warn|error|debug)\(/,
                description: 'Console statements found in production code'
              },
              {
                name: 'Empty catch blocks',
                test: /catch\s*\(\s*\)\s*\{\s*\}/,
                description: 'Empty catch block found - error handling missing'
              },
              {
                name: 'Hardcoded secrets',
                test: /(password|secret|key|token)\s*[:=]\s*['"][^'"]+['"]/i,
                description: 'Potential hardcoded secret detected'
              }
            ];
            
            const detectedIssues = scanForIssues('.', lowHangingFruitPatterns);
            
            // Group by type for issue creation
            const grouped = {};
            for (const issue of detectedIssues) {
              if (!grouped[issue.type]) grouped[issue.type] = [];
              grouped[issue.type].push(issue);
            }
            
            const issueBody = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Detected Low Hanging Fruit

${Object.entries(grouped).map(([type, items]) => `
### ${type}
${items.map(i => `- \`${i.file}\`: ${i.description}`).join('\n')}
`).join('\n')}

## Bounty

/bounty $50

## Instructions

1. Claim this issue by commenting below
2. Create a pull request that addresses the detected items
3. Ensure all tests pass
`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Low Hanging Fruit: ${Object.keys(grouped).join(', ')}`,
              body: issueBody,
              labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', 'bounty', '💎 Bounty']
            });