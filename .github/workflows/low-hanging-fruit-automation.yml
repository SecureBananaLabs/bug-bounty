name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Recursive function to find files with potential issues patterns
            async function findLowHangingFruit(dir, results = []) {
              const items = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const item of items) {
                const fullPath = path.join(dir, item.name);
                
                if (item.isDirectory() && item.name !== 'node_modules' && item.name !== '.git') {
                  await findLowHangingFruit(fullPath, results);
                } else if (item.isFile()) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const issues = [];
                  
                  // Check for TODO comments
                  const todoMatches = content.match(/TODO[:\s].*/gi);
                  if (todoMatches) {
                    todoMatches.forEach(match => {
                      issues.push({
                        type: 'TODO',
                        description: match.trim(),
                        file: fullPath
                      });
                    });
                  }
                  
                  // Check for FIXME comments
                  const fixmeMatches = content.match(/FIXME[:\s].*/gi);
                  if (fixmeMatches) {
                    fixmeMatches.forEach(match => {
                      issues.push({
                        type: 'FIXME',
                        description: match.trim(),
                        file: fullPath
                      });
                    });
                  }
                  
                  // Check for placeholder/empty implementations
                  if (content.includes('// TODO') || content.includes('// FIXME') || content.includes('placeholder') || content.includes('Placeholder')) {
                    if (issues.length === 0) {
                      issues.push({
                        type: 'PLACEHOLDER',
                        description: 'Placeholder or incomplete implementation detected',
                        file: fullPath
                      });
                    }
                  }
                  
                  results.push(...issues);
                }
              }
              
              return results;
            }
            
            const findings = await findLowHangingFruit('.');
            
            // Create GitHub issues for findings
            for (const finding of findings.slice(0, 5)) { // Limit to 5 issues per run
              const title = `[Low Hanging Fruit] ${finding.type} in ${finding.file.replace('./', '')}`;
              const body = `## Automated Low Hanging Fruit Detection

**Type:** ${finding.type}
**File:** \`${finding.file}\`
**Description:** ${finding.description}

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

/bounty $50

---
*This issue was automatically created by the Low Hanging Fruit Automation workflow.*`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty']
              });
            }
            
            console.log(`Created ${Math.min(findings.length, 5)} issues from ${findings.length} findings.`);