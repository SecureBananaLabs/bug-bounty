name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-low-hanging-fruit-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and create low hanging fruit issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Recursively find TODO, FIXME, HACK, XXX, BUG comments in source files
            const patterns = ['TODO', 'FIXME', 'HACK', 'XXX', 'BUG'];
            const issueTitle = 'Low Hanging Fruit: Automated Bug Detection';
            const issueBody = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Automated Detection Results

The following patterns were found in the codebase and require attention:
${patterns.map(p => `- ${p}`).join('\n')}

Please review the codebase for occurrences of these patterns and create appropriate fixes.

---
*This issue was automatically generated by the Low Hanging Fruit Automation workflow.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', 'bounty']
            });