name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const LOW_HANGING_FRUIT_LABELS = ['good first issue', 'bug', 'documentation', 'help wanted'];
            const EXCLUDED_DIRS = ['node_modules', '.git', '.github', 'dist', 'build', '.next'];
            const MAX_FILE_SIZE = 100 * 1024; // 100KB

            function findFiles(dir, extensions = []) {
              const files = [];
              function walk(currentDir) {
                let entries;
                try {
                  entries = fs.readdirSync(currentDir, { withFileTypes: true });
                } catch {
                  return;
                }
                for (const entry of entries) {
                  const fullPath = path.join(currentDir, entry.name);
                  if (entry.isDirectory()) {
                    if (!EXCLUDED_DIRS.includes(entry.name)) {
                      walk(fullPath);
                    }
                  } else if (extensions.length === 0 || extensions.some(ext => entry.name.endsWith(ext))) {
                    const stat = fs.statSync(fullPath);
                    if (stat.size <= MAX_FILE_SIZE) {
                      files.push(fullPath);
                    }
                  }
                }
              }
              walk(dir);
              return files;
            }

            function detectIssues() {
              const issues = [];
              const rootDir = process.env.GITHUB_WORKSPACE || '.';

              // Check for missing tests
              const sourceFiles = findFiles(rootDir, ['.ts', '.tsx', '.js', '.jsx']);
              const testFiles = findFiles(rootDir, ['.test.ts', '.test.tsx', '.spec.ts', '.spec.tsx']);
              const sourceWithoutTests = sourceFiles.filter(f => {
                if (f.includes('.test.') || f.includes('.spec.')) return false;
                const base = f.replace(/\.(ts|tsx|js|jsx)$/, '');
                return !testFiles.some(t => t.includes(base));
              });
              
              if (sourceWithoutTests.length > 0) {
                const sampleFiles = sourceWithoutTests.slice(0, 5).map(f => path.relative(rootDir, f));
                issues.push({
                  title: 'Add missing unit tests for uncovered source files',
                  body: `The following source files lack corresponding test files:\n\n${sampleFiles.map(f => `- \\`${f}\\``).join('\n')}\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`
                });
              }

              // Check for TODO/FIXME comments
              const allFiles = findFiles(rootDir, ['.ts', '.tsx', '.js', '.jsx', '.md']);
              const todoFiles = [];
              for (const file of allFiles.slice(0, 50)) {
                try {
                  const content = fs.readFileSync(file, 'utf8');
                  if (content.includes('TODO') || content.includes('FIXME') || content.includes('HACK')) {
                    const lines = content.split('\n').filter(l => l.includes('TODO') || l.includes('FIXME') || l.includes('HACK'));
                    todoFiles.push({ file: path.relative(rootDir, file), lines });
                  }
                } catch {}
              }
              
              if (todoFiles.length > 0) {
                const body = todoFiles.slice(0, 5).map(f => `- **${f.file}**: ${f.lines.length} marker(s)`).join('\n');
                issues.push({
                  title: 'Resolve TODO/FIXME/HACK comments in codebase',
                  body: `Found TODO/FIXME/HACK markers in the following files:\n\n${body}\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`
                });
              }

              // Check for missing documentation
              const hasContributing = fs.existsSync(path.join(rootDir, 'CONTRIBUTING.md'));
              if (!hasContributing) {
                issues.push({
                  title: 'Create CONTRIBUTING.md with contribution guidelines',
                  body: `The repository is missing a CONTRIBUTING.md file. Please create one with clear guidelines for contributors.\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`
                });
              }

              return issues;
            }

            const issues = detectIssues();
            console.log(`Detected ${issues.length} low hanging fruit issues`);

            for (const issue of issues) {
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: LOW_HANGING_FRUIT_LABELS
                });
                console.log(`Created issue: ${issue.title}`);
              } catch (error) {
                console.error(`Failed to create issue "${issue.title}":`, error.message);
              }
            }