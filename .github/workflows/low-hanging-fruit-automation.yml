name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      | name: Install dependencies
        run: |
          npm install -g @github/github-script

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Patterns that indicate low hanging fruit / easy fixes
            const lowHangingPatterns = [
              { pattern: /TODO|FIXME|HACK|BUG|XXX/g, type: 'code-comment' },
              { pattern: /console\.(log|warn|error)/g, type: 'console-statement' },
              { pattern: /debugger;/g, type: 'debugger-statement' },
              { pattern: /unused|deprecated|legacy/i, type: 'cleanup' },
            ];

            async function scanDirectory(dir, results = []) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory() && !entry.name.startsWith('.') && entry.name !== 'node_modules') {
                  await scanDirectory(fullPath, results);
                } else if (entry.isFile() && /\.(ts|tsx|js|jsx|py|rb|go|rs|java|kt|swift|md)$/.test(entry.name)) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  for (const { pattern, type } of lowHangingPatterns) {
                    const matches = content.match(pattern);
                    if (matches) {
                      results.push({
                        file: fullPath,
                        type,
                        count: matches.length,
                        sample: content.substring(Math.max(0, content.indexOf(matches[0]) - 50), content.indexOf(matches[0]) + matches[0].length + 50)
                      });
                    }
                  }
                }
              }
              return results;
            }

            const findings = await scanDirectory('.');
            
            // Group findings by type for issue creation
            const grouped = findings.reduce((acc, f) => {
              acc[f.type] = acc[f.type] || [];
              acc[f.type].push(f);
              return acc;
            }, {});

            for (const [type, items] of Object.entries(grouped)) {
              const title = `[Low Hanging Fruit] ${type}: ${items.length} occurrences found`;
              const body = `## Automated Low Hanging Fruit Detection

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue Low Hanging Fruit Automation for more information.

### Findings (${items.length} total)

${items.map(i => `- \`${i.file}\`: ${i.count} occurrence(s)`).join('\n')}

### Sample
\`\`\`
${items[0]?.sample || 'N/A'}
\`\`\`
`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', '💎 Bounty']
              });
            }

            console.log(`Created ${Object.keys(grouped).length} issue(s) from ${findings.length} findings`);