name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detection
        id: detect
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Simple heuristic: scan for TODO, FIXME, XXX, HACK comments
            // and common bug patterns in source files
            const patterns = [
              { pattern: /TODO|FIXME|XXX|HACK/gi, label: 'bug', title: 'Unresolved TODO/FIXME comment found' },
              { pattern: /console\\.(log|warn|error)/g, label: 'good first issue', title: 'Remove console statement' },
              { pattern: /debugger;/g, label: 'bug', title: 'Debugger statement left in code' },
              { pattern: /process\\.env\\.[A-Z_]+/g, label: 'bug', title: 'Potential unvalidated environment variable usage...");
          
          echo "detection_complete=true" >> $GITHUB_OUTPUT

      - name: Create GitHub Issues for detected items
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a sample low-hanging fruit issue to demonstrate automation
          # In production, this would iterate over detected items
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d '{
              "title": "Automated: Review and resolve low-hanging fruit items",
              "body": "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Automated Detection Summary\n\nThis issue was automatically created by the Low Hanging Fruit Automation workflow.\n\n### Potential items to address:\n- [ ] Review TODO/FIXME comments in codebase\n- [ ] Remove console.log statements from production code\n- [ ] Check for debugger statements\n- [ ] Validate environment variable usage\n- [ ] Review error handling patterns\n- [ ] Check for unused imports/dependencies\n\n### Instructions\n1. Run \\`npm run lint\\` to identify code quality issues\n2. Run \\`npm run test\\` to identify failing tests\n3. Address one item at a time\n4. Create a pull request referencing this issue",
              "labels": ["bug","good first issue","help wanted","bug bounty","AI agent friendly","bounty","💎 Bounty"]
            }'