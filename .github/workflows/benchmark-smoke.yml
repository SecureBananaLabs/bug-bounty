name: Benchmark smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/benchmark-smoke.yml"
  workflow_dispatch:

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run benchmark:test

      - run: npm run benchmark:smoke
        env:
          BENCHMARK_DURATION_SECONDS: 1
          BENCHMARK_CONNECTIONS: 1
          BENCHMARK_TTFB_SAMPLES: 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-smoke-results
          path: benchmarks/results/
