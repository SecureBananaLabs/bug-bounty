name: Benchmark Smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - ".github/workflows/benchmark-smoke.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API benchmark smoke test
        run: npm run benchmark:smoke
