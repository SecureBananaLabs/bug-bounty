name: Benchmark smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/benchmark-smoke.yml"

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run benchmark:smoke
        env:
          BENCHMARK_AGENT: github-actions
