name: API benchmark smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/benchmark-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/benchmark-smoke.yml"

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start API
        env:
          RATE_LIMIT_MAX: 10000000
        run: |
          npm run start -w apps/api &
          for attempt in {1..20}; do
            if curl --silent --fail http://127.0.0.1:4000/health; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run benchmark smoke
        run: npm run benchmark:smoke
