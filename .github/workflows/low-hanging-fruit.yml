name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Patterns that indicate low-hanging fruit / easy fixes
            const patterns = [
              { pattern: /TODO|FIXME|HACK|XXX/g, label: 'good first issue', title: 'Resolve TODO/FIXME comment' },
              { pattern: /console\.(log|warn|error)\(/g, label: 'good first issue', title: 'Remove debug console statement' },
              { pattern: /\/\/ @ts-ignore/g, label: 'good first issue', title: 'Fix TypeScript ignore comment' },
              { pattern: /unused|deprecated/i, label: 'good first issue', title: 'Clean up unused/deprecated code' },
              { pattern: /eslint-disable(?!-next-line|-line)/g, label: 'good first issue', title: 'Resolve ESLint disable' },
            ];

            const searchPaths = ['apps', 'packages', 'docs'];
            const findings = [];

            function scanDirectory(dir, relativePath = '') {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                const relPath = path.join(relativePath, entry.name);
                
                if (entry.isDirectory() && !entry.name.startsWith('.') && entry.name !== 'node_modules') {
                  scanDirectory(fullPath, relPath);
                } else if (entry.isFile() && /\.(ts|tsx|js|jsx|md)$/.test(entry.name)) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const lines = content.split('\n');
                  
                  for (let i = 0; i < lines.length; i++) {
                    for (const { pattern, label, title } of patterns) {
                      if (pattern.test(lines[i])) {
                        findings.push({
                          title: `${title} in ${relPath}`,
                          body: `## Low Hanging Fruit Detected\n\n**File:** \`${relPath}\`\n**Line:** ${i + 1}\n**Content:** \`${lines[i].trim().substring(0, 100)}\`\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n### Suggested Fix\n- [ ] Locate the flagged code\n- [ ] Implement a proper fix\n- [ ] Remove any temporary workarounds\n- [ ] Add tests if applicable`,
                          labels: [label, 'bug bounty', 'AI agent friendly', '💎 Bounty'],
                        });
                      }
                    }
                  }
                }
              }
            }

            for (const searchPath of searchPaths) {
              const fullPath = path.join(process.cwd(), searchPath);
              if (fs.existsSync(fullPath)) {
                scanDirectory(fullPath, searchPath);
              }
            }

            // Create issues (limit to 5 per run to avoid spam)
            const limitedFindings = findings.slice(0, 5);
            
            for (const finding of limitedFindings) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: finding.title,
                body: finding.body,
                labels: finding.labels,
              });
            }

            console.log(`Created ${limitedFindings.length} issues out of ${findings.length} findings`);