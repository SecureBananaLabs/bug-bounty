name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detector
        id: detector
        run: |
          node .github/scripts/detect-low-hanging-fruit.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issues for detected items
        if: steps.detector.outputs.issues-created == 'true'
        run: |
          echo "Low hanging fruit issues created successfully"

      - name: Recursively schedule next run if issues found
        if: steps.detector.outputs.has-more-issues == 'true'
        run: |
          echo "More potential issues detected, will be picked up in next scheduled run"
          # The cron schedule handles recursive execution
          # This step documents the recursive nature of the automation
          echo "Recursive automation is active - next run: $(date -d 'tomorrow 00:00' -u +%Y-%m-%dT%H:%M:%SZ)"