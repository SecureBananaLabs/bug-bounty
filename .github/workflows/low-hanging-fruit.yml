name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        id: lint
        run: |
          npm run lint --if-present 2>&1 | tee lint-output.txt || true
          echo "lint_exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Run tests
        id: tests
        run: |
          npm test --if-present 2>&1 | tee test-output.txt || true
          echo "test_exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Check for security vulnerabilities
        id: security
        run: |
          npm audit --audit-level=moderate 2>&1 | tee audit-output.txt || true
          echo "audit_exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Analyze and create issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Read outputs
            let lintOutput = '';
            let testOutput = '';
            let auditOutput = '';
            
            try { lintOutput = fs.readFileSync('lint-output.txt', 'utf8'); } catch (e) {}
            try { testOutput = fs.readFileSync('test-output.txt', 'utf8'); } catch (e) {}
            try { auditOutput = fs.readFileSync('audit-output.txt', 'utf8'); } catch (e) {}
            
            const issues = [];
            
            // Check for linting issues
            if (lintOutput.includes('error') || lintOutput.includes('warning')) {
              issues.push({
                title: 'Fix ESLint errors and warnings',
                body: `## Automated Detection: Linting Issues\n\nThe following linting issues were detected:\n\n\`\`\`\n${lintOutput.substring(0, 3000)}\n\`\`\`\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`
              });
            }
            
            // Check for test failures
            if (testOutput.includes('FAIL') || testOutput.includes('failing')) {
              issues.push({
                title: 'Fix failing test suites',
                body: `## Automated Detection: Test Failures\n\nThe following test failures were detected:\n\n\`\`\`\n${testOutput.substring(0, 3000)}\n\`\`\`\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`
              });
            }
            
            // Check for security vulnerabilities
            if (auditOutput.includes('vulnerability') || auditOutput.includes('Critical') || auditOutput.includes('High')) {
              issues.push({
                title: 'Address npm security vulnerabilities',
                body: `## Automated Detection: Security Vulnerabilities\n\nThe following security vulnerabilities were detected:\n\n\`\`\`\n${auditOutput.substring(0, 3000)}\n\`\`\`\n\nThis issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.`
              });
            }
            
            // Create issues
            for (const issue of issues) {
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: ['bug', 'automation', 'low-hanging-fruit']
                });
                console.log(`Created issue: ${issue.title}`);
              } catch (error) {
                console.error(`Failed to create issue: ${issue.title}`, error);
              }
            }
            
            // If no issues found, create a maintenance issue
            if (issues.length === 0) {
              console.log('No low hanging fruit detected. Repository is clean!');
            }