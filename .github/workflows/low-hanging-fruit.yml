name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Recursively scan for common low hanging fruit patterns
            async function scanForIssues(dir, results = []) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                
                if (entry.isDirectory() && entry.name !== 'node_modules' && entry.name !== '.git') {
                  await scanForIssues(fullPath, results);
                } else if (entry.isFile()) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const relativePath = path.relative(process.cwd(), fullPath);
                  
                  // Check for TODO/FIXME comments
                  const todoRegex = /(TODO|FIXME|XXX|HACK|BUG)\s*:?\s*(.+)/gi;
                  let match;
                  while ((match = todoRegex.exec(content)) !== null) {
                    results.push({
                      type: 'TODO/FIXME',
                      file: relativePath,
                      line: content.substring(0, match.index).split('\n').length,
                      description: match[2].trim()
                    });
                  }
                  
                  // Check for console.log statements
                  if (/console\.(log|warn|error)\s*\(/.test(content) && !fullPath.includes('test') && !fullPath.includes('spec')) {
                    results.push({
                      type: 'Console Statement',
                      file: relativePath,
                      description: 'Contains console.log or similar statements that should be removed or replaced with proper logging'
                    });
                  }
                }
              }
              
              return results;
            }

            const issues = await scanForIssues('.');
            
            // Create GitHub issues for each finding
            for (const issue of issues.slice(0, 10)) { // Limit to 10 issues per run
              const title = `[Low Hanging Fruit] ${issue.type} in ${issue.file}`;
              const body = `## Issue Type: ${issue.type}

**File:** \`${issue.file}\`
${issue.line ? `**Line:** ${issue.line}` : ''}

**Description:** ${issue.description}

---

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

/bounty $50`;

              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: body,
                  labels: ['bug', 'good first issue', 'low hanging fruit', 'bounty']
                });
                console.log(`Created issue: ${title}`);
              } catch (error) {
                if (error.status === 422) {
                  console.log(`Issue already exists or validation failed: ${title}`);
                } else {
                  throw error;
                }
              }
            }

            console.log(`Scanned and created issues. Found ${issues.length} items.`);