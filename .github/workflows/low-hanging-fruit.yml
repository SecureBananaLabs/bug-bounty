name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          #!/bin/bash
          set -e

          # Define low hanging fruit patterns to search for
          # These are common patterns indicating quick fixes or missing implementations
          
          # Search for TODO, FIXME, HACK, XXX comments in source code
          # Search for placeholder implementations
          # Search for empty functions or stubs
          # Search for console.log statements that should be removed
          # Search for missing error handling
          
          REPO="${{ github.repository }}"
          
          # Function to create an issue if it doesn't already exist
          create_issue_if_not_exists() {
            local title="$1"
            local body="$2"
            local label="$3"
            
            # Check if issue already exists
            existing_issue=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/issues?state=open&per_page=100" | \
              jq -r ".[] | select(.title == \"$title\") | .number" | head -n 1)
            
            if [ -z "$existing_issue" ]; then
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/issues" \
                -d "{
                  \"title\": \"$title\",
                  \"body\": \"$body\",
                  \"labels\": [\"$label\", \"good first issue\", \"bug bounty\", \"AI agent friendly\"]
                }"
              echo "Created issue: $title"
            else
              echo "Issue already exists: $title (#$existing_issue)"
            fi
          }
          
          # Create issues for common low hanging fruit patterns
          
          # Issue 1: Remove console.log statements
          create_issue_if_not_exists \
            "Remove console.log statements from production code" \
            "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Description\nSearch the codebase for console.log, console.warn, and console.error statements that should be replaced with proper logging or removed entirely.\n\n## Acceptance Criteria\n- [ ] Identify all console.log statements in production code\n- [ ] Replace with proper logging utility or remove if unnecessary\n- [ ] Ensure no console statements remain in production builds" \
            "bug"
          
          # Issue 2: Add error handling to async functions
          create_issue_if_not_exists \
            "Add proper error handling to async functions" \
            "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Description\nReview async functions throughout the codebase and ensure they have proper try/catch blocks or .catch() handlers.\n\n## Acceptance Criteria\n- [ ] Identify async functions without error handling\n- [ ] Add appropriate try/catch blocks\n- [ ] Ensure errors are properly logged and handled" \
            "bug"
          
          # Issue 3: Fix placeholder implementations
          create_issue_if_not_exists \
            "Replace placeholder and stub implementations" \
            "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Description\nSearch for placeholder implementations, stub functions, and TODO comments that indicate incomplete features.\n\n## Acceptance Criteria\n- [ ] Identify all placeholder/stub implementations\n- [ ] Implement proper functionality or create follow-up issues\n- [ ] Remove TODO comments that are no longer relevant" \
            "bug"
          
          # Issue 4: Add input validation
          create_issue_if_not_exists \
            "Add input validation to API endpoints" \
            "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Description\nReview API endpoints to ensure all inputs are properly validated using Zod or similar validation libraries.\n\n## Acceptance Criteria\n- [ ] Identify endpoints missing input validation\n- [ ] Add Zod schemas for all inputs\n- [ ] Add middleware to validate requests" \
            "bug"
          
          # Issue 5: Fix missing environment variable checks
          create_issue_if_not_exists \
            "Add environment variable validation on startup" \
            "This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Description\nEnsure all required environment variables are checked at application startup and provide clear error messages if any are missing.\n\n## Acceptance Criteria\n- [ ] Identify all required environment variables\n- [ ] Add validation on startup\n- [ ] Provide clear error messages for missing variables" \
            "bug"
        shell: bash