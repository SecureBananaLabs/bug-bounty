name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run low hanging fruit detection
        id: detect
        run: |
          node scripts/detect-low-hanging-fruit.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create issues from detected items
        if: steps.detect.outputs.has_issues == 'true'
        run: |
          node scripts/create-issues.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit updated tracking
        if: steps.detect.outputs.has_issues == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/low-hanging-fruit-tracked.json
          git diff --staged --quiet || git commit -m "chore: track newly created low hanging fruit issues"
          git push