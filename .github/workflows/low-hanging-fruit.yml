name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and create low hanging fruit issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const existingTitles = new Set(issues.map(i => i.title));
            
            const lowHangingFruits = [
              { title: 'Fix: Add input validation to API routes', body: 'This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Task\nAdd comprehensive input validation using Zod schemas for all API routes in `apps/api`.' },
              { title: 'Fix: Implement rate limiting on all endpoints', body: 'This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Task\nEnsure all API endpoints have proper rate limiting middleware applied.' },
              { title: 'Fix: Add error handling middleware', body: 'This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Task\nImplement centralized error handling middleware to catch and format all API errors consistently.' },
              { title: 'Fix: Secure file upload validation', body: 'This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Task\nAdd file type and size validation for all file upload endpoints.' },
              { title: 'Fix: Add CORS configuration', body: 'This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.\n\n## Task\nImplement proper CORS configuration for the API to prevent unauthorized cross-origin requests.' }
            ];
            
            for (const fruit of lowHangingFruits) {
              if (!existingTitles.has(fruit.title)) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context repo.repo,
                  title: fruit.title,
                  body: fruit.body,
                  labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly']
                });
              }
            }