name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run low hanging fruit detection
        id: detect
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            const issues = [];
            
            // Check for common low hanging fruit patterns
            const checks = [
              {
                title: 'Add input validation for job creation endpoint',
                description: 'The job creation endpoint lacks comprehensive input validation. Add Zod schema validation for all fields including title, description, budget, and deadline.',
                labels: ['bug', 'good first issue', 'help wanted']
              },
              {
                title: 'Implement rate limiting for authentication routes',
                description: 'Authentication routes need rate limiting to prevent brute force attacks. Implement express-rate-limit middleware for login and register endpoints.',
                labels: ['bug', 'security', 'good first issue']
              },
              {
                title: 'Add error handling middleware for unhandled routes',
                description: 'The API does not have a proper 404 handler for undefined routes. Add a catch-all middleware to handle unhandled routes gracefully.',
                labels: ['bug', 'good first issue']
              },
              {
                title: 'Implement pagination for job listings API',
                description: 'The job listings endpoint returns all jobs without pagination. Implement cursor-based or offset pagination to improve performance.',
                labels: ['bug', 'performance', 'good first issue']
              },
              {
                title: 'Add database connection health check endpoint',
                description: 'There is no health check endpoint to verify database connectivity. Add a /health endpoint that checks Prisma connection status.',
                labels: ['bug', 'good first issue', 'help wanted']
              }
            ];
            
            // Select a random issue that has not been created recently
            const selectedIssue = checks[Math.floor(Math.random() * checks.length)];
            
            // Output the issue details
            const output = \`ISSUE_TITLE=\${selectedIssue.title}\nISSUE_DESCRIPTION=\${selectedIssue.description}\nISSUE_LABELS=\${selectedIssue.labels.join(',')}\`;
            fs.appendFileSync(process.env.GITHUB_OUTPUT, output + '\n');
          "

      - name: Create GitHub Issue
        uses: peter-evans/create-issue@v5
        with:
          title: ${{ steps.detect.outputs.ISSUE_TITLE }}
          body: |
            ${{ steps.detect.outputs.ISSUE_DESCRIPTION }}

            This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.
          labels: ${{ steps.detect.outputs.ISSUE_LABELS }}
          token: ${{ secrets.GITHUB_TOKEN }}