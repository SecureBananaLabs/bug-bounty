name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and create low hanging fruit issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read leaderboard to find contributors
            const leaderboardPath = path.join(process.env.GITHUB_WORKSPACE, 'leaderboard.json');
            let contributors = [];
            if (fs.existsSync(leaderboardPath)) {
              const data = fs.readFileSync(leaderboardPath, 'utf8');
              contributors = JSON.parse(data);
            }
            
            // Create a new issue for low hanging fruit
            const issueBody = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Task
Automate low hanging fruit bug detection and issue creation recursively.

## Bounty
$700

## Instructions
1. Find a feature/bug to work on from this repository
2. Create a GitHub issue on the repository to start working on it
3. Use the required string in the issue that you created`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Low Hanging Fruit Automation - Recursive Issue Creation',
              body: issueBody,
              labels: ['bug', 'documentation', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', 'bounty', '💎 Bounty', '$700']
            });
            
            console.log('Successfully created low hanging fruit issue');