name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and create low hanging fruit issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the issue template
            const templatePath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'ISSUE_TEMPLATE', 'low-hanging-fruit.md');
            const template = fs.readFileSync(templatePath, 'utf8');
            
            // Find existing issues to avoid duplicates
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const existingTitles = new Set(existingIssues.map(i => i.title));
            
            // Create new issue if it doesn't exist
            if (!existingTitles.has('Low Hanging Fruit: Automated Bug Detection')) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Low Hanging Fruit: Automated Bug Detection',
                body: template
              });
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}