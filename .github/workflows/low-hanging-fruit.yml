name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and create low hanging fruit issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read leaderboard to find potential contributors
            const leaderboardPath = path.join(process.env.GITHUB_WORKSPACE, 'leaderboard.json');
            let leaderboard = [];
            try {
              const data = fs.readFileSync(leaderboardPath, 'utf8');
              leaderboard = JSON.parse(data);
            } catch (e) {
              console.log('No leaderboard.json found or invalid');
            }
            
            // Create a new issue for low hanging fruit automation
            const issueBody = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Task
Automate low hanging fruit bug detection and issue creation recursively.

## Description
This issue tracks the automation of detecting simple bugs and creating issues for them. The automation should scan the codebase for common patterns that indicate potential issues and create GitHub issues automatically.

## Acceptance Criteria
- [ ] Implement automated scanning for common bug patterns
- [ ] Create GitHub issues automatically when patterns are detected
- [ ] Ensure issues are properly labeled and assigned`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Low Hanging Fruit Automation - Recursive Issue Creation',
              body: neighbourhoods: issueBody,
              labels: ['bug', 'good first issue', 'help wanted', 'bug bounty', 'AI agent friendly', 'bounty', '💎 Bounty']
            });
            
            console.log('Created low hanging fruit automation issue');