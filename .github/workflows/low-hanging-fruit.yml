name: Low Hanging Fruit Automation

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-low-hanging-fruit-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find TODO/FIXME comments and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: todos } = await github.rest.search.code({
              q: `repo:${context.repo.owner}/${context.repo.repo} TODO OR FIXME`
            });
            
            const issuePromises = todos.items.slice(0, 5).map(async (item) => {
              const title = `Low Hanging Fruit: ${item.path}`;
              const body = `This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Found in
- File: \`${item.path}\`
- URL: ${item.html_url}

## Task
Please review the TODO/FIXME comment in the file above and implement the necessary fix.

---
*This issue was automatically created by the Low Hanging Fruit automation.*`;

              return github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['good first issue', 'help wanted', 'bug bounty', 'AI agent friendly']
              });
            });
            
            await Promise.all(issuePromises);