name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');

          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GITHUB_TOKEN;

          // Helper to run GitHub CLI commands
          function gh(args) {
            return execSync(\`gh \${args}\`, { encoding: 'utf-8', env: { ...process.env, GH_TOKEN: token } });
          }

          // Check if we already have an open issue with the specific string to avoid duplicates
          const existingIssues = JSON.parse(gh(\`issue list --repo \${repo} --state open --json number,title,body --limit 100\`));
          const targetString = 'This issue is limited only to the creator of this issue.';

          const hasOpenAutomationIssue = existingIssues.some(issue => issue.body && issue.body.includes(targetString));

          if (hasOpenAutomationIssue) {
            console.log('An open automation issue already exists. Skipping creation.');
            process.exit(0);
          }

          // Find potential low hanging fruit: TODO comments, FIXME comments, or simple enhancements
          const files = execSync('git ls-files').toString().split('\n').filter(f => f);
          const candidates = [];

          for (const file of files.slice(0, 50)) {
            if (!file.match(/\\.(ts|tsx|js|jsx|md|py|rb|go|rs|java|kt|swift)$/)) continue;
            try {
              const content = fs.readFileSync(file, 'utf-8');
              const lines = content.split('\n');
              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.includes('TODO') || line.includes('FIXME') || line.includes('HACK') || line.includes('XXX')) {
                  candidates.push({ file, line: i + 1, text: line.trim() });
                }
              }
            } catch (e) {}
          }

          if (candidates.length === 0) {
            console.log('No low hanging fruit found.');
            process.exit(0);
          }

          const sample = candidates.slice(0, 5);
          const body = \## Low Hanging Fruit Detected

This automated issue tracks easily addressable improvements found in the codebase.

\${sample.map(c => \`- [\`\${c.file}:\${c.line}\`](\${c.file}#L\${c.line}) - \${c.text}\`).join('\n')}

---

This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

> Bounty: This issue is part of the Low Hanging Fruit Automation bounty. /bounty $700
\`;

          // Create the issue using gh CLI
          const result = gh(\`issue create --repo \${repo} --title 'Low Hanging Fruit: Automated Detection Round' --body '\${body.replace(/'/g, \"'\\''\")}'\`);
          console.log('Created issue:', result);
          "