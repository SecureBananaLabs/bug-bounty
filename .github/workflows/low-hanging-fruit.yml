name: Low Hanging Fruit Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect low hanging fruit and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          #!/bin/bash
          set -e

          # Function to create an issue
          create_issue() {
            local title="$1"
            local body="$2"
            local labels="$3"
            
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues" \
              -d "{
                \"title\": \"$title\",
                \"body\": \"$body\",
                \"labels\": $labels
              }"
          }

          # Detect missing documentation
          if [ ! -f "CONTRIBUTING.md" ] || [ ! -s "CONTRIBUTING.md" ]; then
            echo "Missing or empty CONTRIBUTING.md detected"
          fi

          # Detect missing tests
          if [ ! -d "apps/web/__tests__" ] && [ ! -d "apps/api/__tests__" ]; then
            echo "Missing test directories detected"
          fi

          # Detect missing environment documentation
          if [ ! -f ".env.example" ]; then
            echo "Missing .env.example detected"
          fi

          # Create issue for missing environment documentation
          ISSUE_BODY="This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.

## Description
The repository is missing a \`.env.example\` file to help developers understand required environment variables.

## Tasks
- [ ] Create a \`.env.example\` file in the root directory
- [ ] Include all required environment variables for:
  - Database configuration
  - Authentication (JWT, OAuth)
  - Stripe integration
  - Other third-party services

## Acceptance Criteria
- [ ] File exists at \`.env.example\`
- [ ] All required variables are documented with comments
- [ ] No sensitive values are committed"

          # Check if similar issue already exists
          EXISTING_ISSUES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&labels=bug,documentation" | \
            grep -c "Missing .env.example file" || true)

          if [ "$EXISTING_ISSUES" -eq "0" ]; then
            create_issue "Missing .env.example file for environment configuration" "$ISSUE_BODY" '["bug", "documentation", "good first issue", "help wanted", "bug bounty", "AI agent friendly", "bounty", "💎 Bounty"]'
            echo "Created issue for missing .env.example"
          else
            echo "Issue already exists for missing .env.example"
          fi

          echo "Low hanging fruit detection complete"