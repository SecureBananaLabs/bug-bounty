name: API Benchmarks

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "benchmarks/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/api-benchmarks.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Start API
        run: |
          npm run start -w apps/api > /tmp/freelanceflow-api.log 2>&1 &
          echo $! > /tmp/freelanceflow-api.pid
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Run smoke benchmark
        run: |
          BENCHMARK_CONNECTIONS=1 BENCHMARK_SMOKE_AMOUNT=1 timeout 60s npm run benchmark:smoke
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/freelanceflow-api.pid ]; then
            kill "$(cat /tmp/freelanceflow-api.pid)" || true
          fi
