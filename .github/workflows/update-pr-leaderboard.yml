name: Update PR leaderboard

on:
  pull_request_target:
    types:
      - opened

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: leaderboard-json-update-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch (trusted code only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Increment PR count in leaderboard.json
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/update-pr-leaderboard.mjs
