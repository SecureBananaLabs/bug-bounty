name: "Low Hanging Fruit"
about: "Create issues for new features or bugs to work on"
title: "Low Hanging Fruit: [Feature/Bug Description]"
labels: ["good first issue", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        This issue is limited only to the creator of this issue. This means that only the issue author can attempt to solve this issue. If you would like to work on it, please create another issue with the same contents and refer to issue #743 for more information.
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the feature or bug you want to work on"
      placeholder: "Explain what you want to implement or fix..."
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: "Approach"
      description: "Describe your approach to solving this"
      placeholder: "How do you plan to implement this feature or fix this bug?"
    validations:
      required: true