<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Message creation validation demo</title>
  <desc id="desc">Regression summary for POST /api/messages validation.</desc>
  <rect width="1280" height="720" fill="#0b1020"/>
  <rect x="64" y="60" width="1152" height="600" rx="24" fill="#111936" stroke="#2a3765" stroke-width="2"/>
  <text x="104" y="128" fill="#f2f5ff" font-family="Arial, sans-serif" font-size="44" font-weight="700">Message creation validation</text>
  <text x="104" y="178" fill="#aab7e8" font-family="Arial, sans-serif" font-size="24">POST /api/messages now rejects malformed records before persistence.</text>

  <rect x="104" y="230" width="500" height="300" rx="16" fill="#151c35" stroke="#3a4b84" stroke-width="2"/>
  <text x="136" y="282" fill="#ffb4b4" font-family="Arial, sans-serif" font-size="30" font-weight="700">Rejected</text>
  <text x="136" y="334" fill="#f2f5ff" font-family="Menlo, monospace" font-size="24">{ "body": "Hello" }</text>
  <text x="136" y="384" fill="#f2f5ff" font-family="Menlo, monospace" font-size="24">{ "body": "   " }</text>
  <text x="136" y="450" fill="#ffdddd" font-family="Arial, sans-serif" font-size="26">400</text>
  <text x="194" y="450" fill="#c6d2ff" font-family="Arial, sans-serif" font-size="24">body, senderId, and receiverId are required</text>

  <rect x="676" y="230" width="500" height="300" rx="16" fill="#151c35" stroke="#3a4b84" stroke-width="2"/>
  <text x="708" y="282" fill="#9ff0c2" font-family="Arial, sans-serif" font-size="30" font-weight="700">Accepted</text>
  <text x="708" y="334" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">{ body, senderId, receiverId }</text>
  <text x="708" y="398" fill="#c6d2ff" font-family="Arial, sans-serif" font-size="24">Server still adds generated id and sentAt.</text>
  <text x="708" y="450" fill="#b8ffd1" font-family="Arial, sans-serif" font-size="26">201</text>
  <text x="766" y="450" fill="#c6d2ff" font-family="Arial, sans-serif" font-size="24">valid message is persisted</text>

  <rect x="104" y="574" width="1072" height="50" rx="12" fill="#0f1530" stroke="#2a3765" stroke-width="1"/>
  <text x="132" y="608" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">npm test -w apps/api: 4 tests passed</text>
</svg>
