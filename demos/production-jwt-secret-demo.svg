<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Production JWT secret validation demo</title>
  <desc id="desc">Regression summary for production JWT_SECRET configuration.</desc>
  <rect width="1280" height="720" fill="#0b1020"/>
  <rect x="64" y="60" width="1152" height="600" rx="24" fill="#111936" stroke="#2a3765" stroke-width="2"/>
  <text x="104" y="126" fill="#f2f5ff" font-family="Arial, sans-serif" font-size="42" font-weight="700">Production JWT secret validation</text>
  <text x="104" y="176" fill="#aab7e8" font-family="Arial, sans-serif" font-size="24">NODE_ENV=production no longer signs tokens with a hardcoded fallback.</text>

  <rect x="104" y="230" width="330" height="270" rx="16" fill="#151c35" stroke="#3a4b84" stroke-width="2"/>
  <text x="132" y="282" fill="#ffb4b4" font-family="Arial, sans-serif" font-size="28" font-weight="700">Production missing</text>
  <text x="132" y="340" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">NODE_ENV=production</text>
  <text x="132" y="384" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">JWT_SECRET unset</text>
  <text x="132" y="448" fill="#ffdddd" font-family="Arial, sans-serif" font-size="24">throws clear config error</text>

  <rect x="476" y="230" width="330" height="270" rx="16" fill="#151c35" stroke="#3a4b84" stroke-width="2"/>
  <text x="504" y="282" fill="#9ff0c2" font-family="Arial, sans-serif" font-size="28" font-weight="700">Development</text>
  <text x="504" y="340" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">NODE_ENV=development</text>
  <text x="504" y="384" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">JWT_SECRET unset</text>
  <text x="504" y="448" fill="#d9ffe8" font-family="Arial, sans-serif" font-size="24">keeps local fallback</text>

  <rect x="848" y="230" width="328" height="270" rx="16" fill="#151c35" stroke="#3a4b84" stroke-width="2"/>
  <text x="876" y="282" fill="#9ff0c2" font-family="Arial, sans-serif" font-size="28" font-weight="700">Production set</text>
  <text x="876" y="340" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">JWT_SECRET provided</text>
  <text x="876" y="384" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">PORT=8080</text>
  <text x="876" y="448" fill="#d9ffe8" font-family="Arial, sans-serif" font-size="24">preserves supplied secret</text>

  <rect x="104" y="570" width="1072" height="54" rx="12" fill="#0f1530" stroke="#2a3765" stroke-width="1"/>
  <text x="132" y="606" fill="#f2f5ff" font-family="Menlo, monospace" font-size="22">npm test -w apps/api: 4 tests passed</text>
</svg>
