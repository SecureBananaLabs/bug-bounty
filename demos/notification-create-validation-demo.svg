<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Notification creation validation demo</title>
  <desc id="desc">Shows that notification creation rejects empty or blank payloads with 400 while valid notification payloads still create unread records.</desc>
  <rect width="980" height="520" fill="#0b1020"/>
  <rect x="38" y="36" width="904" height="448" rx="16" fill="#121a31" stroke="#2b3b68"/>
  <text x="72" y="84" fill="#f4f7ff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Notification creation payloads are validated</text>
  <text x="72" y="118" fill="#aab6d8" font-family="Arial, sans-serif" font-size="16">Regression evidence for PR #4569 / issue #4568</text>

  <rect x="72" y="154" width="394" height="242" rx="12" fill="#1d2846" stroke="#394a78"/>
  <text x="98" y="196" fill="#ffb4b4" font-family="Arial, sans-serif" font-size="20" font-weight="700">Rejected</text>
  <text x="98" y="236" fill="#f4f7ff" font-family="Menlo, Consolas, monospace" font-size="16">POST /api/notifications</text>
  <text x="98" y="268" fill="#aab6d8" font-family="Menlo, Consolas, monospace" font-size="15">Body: {}</text>
  <text x="98" y="300" fill="#aab6d8" font-family="Menlo, Consolas, monospace" font-size="15">Body: blank userId/type/message</text>
  <text x="98" y="346" fill="#ffb4b4" font-family="Menlo, Consolas, monospace" font-size="17">400 Bad Request</text>
  <text x="98" y="374" fill="#ffb4b4" font-family="Menlo, Consolas, monospace" font-size="15">Invalid notification payload</text>

  <rect x="514" y="154" width="394" height="242" rx="12" fill="#17283e" stroke="#2e6c75"/>
  <text x="540" y="196" fill="#8df5d0" font-family="Arial, sans-serif" font-size="20" font-weight="700">Still works</text>
  <text x="540" y="236" fill="#f4f7ff" font-family="Menlo, Consolas, monospace" font-size="16">{ userId, type, message }</text>
  <text x="540" y="282" fill="#8df5d0" font-family="Menlo, Consolas, monospace" font-size="17">201 Created</text>
  <text x="540" y="314" fill="#8df5d0" font-family="Menlo, Consolas, monospace" font-size="15">success: true</text>
  <text x="540" y="344" fill="#8df5d0" font-family="Menlo, Consolas, monospace" font-size="15">id: ntf_...</text>
  <text x="540" y="374" fill="#8df5d0" font-family="Menlo, Consolas, monospace" font-size="15">read: false</text>

  <text x="72" y="438" fill="#dbe6ff" font-family="Arial, sans-serif" font-size="16">Validated locally: npm test -w apps/api -> 4 tests passed; node --check changed files; git diff --check.</text>
</svg>
