<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Review payload validation demo">
  <rect width="1280" height="720" fill="#0b1020"/>
  <text x="72" y="86" fill="#f2f5ff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Review creation validation</text>
  <text x="72" y="128" fill="#b9c2df" font-family="Inter, Arial, sans-serif" font-size="23">POST /api/reviews now accepts only validated review payloads.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="72" y="178" width="528" height="376" rx="12" fill="#151c35" stroke="#2a3765"/>
    <text x="104" y="226" fill="#f2f5ff" font-size="27" font-weight="700">Malformed request</text>
    <rect x="104" y="258" width="464" height="116" rx="8" fill="#0f152a" stroke="#2a3765"/>
    <text x="128" y="300" fill="#d7def5" font-size="22">POST /api/reviews</text>
    <text x="128" y="338" fill="#d7def5" font-size="22">{}</text>
    <rect x="104" y="414" width="464" height="88" rx="8" fill="#311d25" stroke="#9a4558"/>
    <text x="128" y="462" fill="#ffbdc7" font-size="25" font-weight="700">400 Invalid review payload</text>

    <rect x="680" y="178" width="528" height="376" rx="12" fill="#151c35" stroke="#2a3765"/>
    <text x="712" y="226" fill="#f2f5ff" font-size="27" font-weight="700">Validated request</text>
    <rect x="712" y="258" width="464" height="156" rx="8" fill="#0f152a" stroke="#2a3765"/>
    <text x="736" y="298" fill="#d7def5" font-size="22">jobId, reviewerId, revieweeId</text>
    <text x="736" y="334" fill="#d7def5" font-size="22">rating: 5</text>
    <text x="736" y="370" fill="#d7def5" font-size="22">comment: "Great delivery"</text>
    <rect x="712" y="454" width="464" height="88" rx="8" fill="#153224" stroke="#3c8b5e"/>
    <text x="736" y="502" fill="#a9f2c7" font-size="25" font-weight="700">201 server-owned rev_* id</text>

    <rect x="176" y="606" width="928" height="58" rx="10" fill="#101832" stroke="#2a3765"/>
    <text x="216" y="644" fill="#f2f5ff" font-size="23">Extra client-controlled fields are rejected before persistence.</text>
  </g>
</svg>
